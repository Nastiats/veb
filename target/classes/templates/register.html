<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="ru">
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Продажа билетов</title>
    <link rel="stylesheet" th:href="@{/css/nst.css}" />
</head><body>

<div class="container">
    <div >
        <div >
            <div >
                <h2 >РЕГИСТРАЦИЯ</h2>
            </div>
            <div th:if="${param.success}">
                <div >
                    Вы успешно зарегистрировались!
                </div>
            </div>
            <div >
                <form
                        method="post"
                        role="form"
                        th:action="@{/new/save}"
                        th:object="${user}"
                >
                    <div >
                        <label >Имя</label>
                        <input
                                id="name"
                                name="name"
                                placeholder="Введите имя:"
                                th:field="*{name}"
                                type="text"
                        />
                        <p th:errors="*{name}"
                           th:if="${#fields.hasErrors('name')}"></p>
                    </div>
                    <div >
                        <label>Email</label>
                        <input
                                id="email"
                                name="email"
                                placeholder="E-mail:"
                                th:field="*{email}"
                                type="email"
                        />
                        <p th:errors="*{email}"
                           th:if="${#fields.hasErrors('email')}"></p>
                    </div>
                    <div >
                        <label class="form-label">Пароль:</label>
                        <input
                                id="password"
                                name="password"
                                placeholder="Введите пароль"
                                th:field="*{password}"
                                type="password"
                        />
                        <p th:errors="*{password}"
                           th:if="${#fields.hasErrors('password')}"></p>
                    </div>
                    <div >
                        <label>Вопрос для восстановления пароля:</label>
                        <input
                                id="usquery"
                                name="usquery"

                                th:field="*{usquery}"
                                type="text"
                        />
                        <p th:errors="*{usquery}"
                           th:if="${#fields.hasErrors('usquery')}"></p>
                    </div>
                    <div >
                        <label class="form-label">Текст ответа на вопрос:</label>
                        <input
                                id="usanswer"
                                name="usanswer"
                                placeholder=""
                                th:field="*{usanswer}"
                                type="text"
                        />
                        <p th:errors="*{usanswer}"
                           th:if="${#fields.hasErrors('usanswer')}"></p>
                    </div>
                    <div >
                        <button type="submit">Зарегистрироваться</button>
                        &nbsp; <span>Уже зарегистрированы? Тогда <a th:href="@{/login}">входите!</a></span>
                    </div>
                </form>

            </div>
        </div>

    </div>

</div>
</body>
</html>
